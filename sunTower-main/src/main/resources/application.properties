# ========== General Spring Configuration ==========
spring.application.name=EstateManagementSystem
spring.config.import=optional:file:.env[.properties]
spring.profiles.group.test[0]=local-nooauth

# ========== Thymeleaf Configuration ==========
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# ========== Active Database Configuration ==========
spring.profiles.active=${SPRING_PROFILES_ACTIVE}

# ========== JPA Configuration ==========
#spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# ========== Email Configuration ==========
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_SMTP_STARTTLS_REQUIRED}
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_SMTP_SSL_TRUST}

# ========== Real Estate Image Upload ==========
# Directory path to store uploaded building images
# (On Windows, use / instead of \ )
building.image.upload-dir=${BUILDING_IMAGE_UPLOAD_DIR:./uploads/building_img}
planning.map.image.upload-dir=${PLANNING_MAP_IMAGE_UPLOAD_DIR:./uploads/planning_map_img}

# Multipart file upload size limit (5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ========== Goong Maps API ==========
goong.api.key=${GOONG_API_KEY}

# ========== JWT Authentication ==========
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION}
jwt.cookie-secure=${JWT_COOKIE_SECURE}

# ========== OAuth2 Login (Google) ==========
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=${GOOGLE_CLIENT_SCOPE}

# ========== QR Payment ==========
payment.qr.bank-bin=${PAYMENT_QR_BANK_BIN}
payment.qr.account-no=${PAYMENT_QR_ACCOUNT_NO}
payment.qr.account-name=${PAYMENT_QR_ACCOUNT_NAME}
payment.qr.confirm-secret=${PAYMENT_QR_CONFIRM_SECRET:${JWT_SECRET}}

# ========== Test Support ==========
test-support.otp-token=${TEST_SUPPORT_OTP_TOKEN:test-otp-token}

