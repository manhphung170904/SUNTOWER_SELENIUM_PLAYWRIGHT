<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>SunTower | Yêu cầu thuê/mua</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        main.content {
            margin-left: 220px;
            padding: 0;
            margin-top: 72px;
        }

        .detail-body {
            padding: 1.5rem;
        }

        .page-header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .page-header-bar h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #111827;
            margin: 0;
        }

        .page-header-bar .update-time {
            font-size: 0.8125rem;
            color: #9ca3af;
            margin-top: 0.2rem;
        }

        .d-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            margin-top: 20px;
        }

        .table-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.875rem 1.5rem;
            border-bottom: 1px solid #f3f4f6;
            background: #fafbfc;
            border-radius: 10px 10px 0 0;
        }

        .table-header-row .thr-title {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.875rem;
            font-weight: 700;
            color: #111827;
        }

        .table-header-row .thr-title i {
            color: #3b82f6;
            font-size: 0.9375rem;
        }

        .dash-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8125rem;
        }

        .dash-table thead th {
            background: #f8fafc;
            padding: 0.5rem 0.875rem;
            font-size: 0.68rem;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1.5px solid #e9ecef;
            white-space: nowrap;
        }

        .dash-table tbody td {
            padding: 0.75rem 0.875rem;
            border-bottom: 1px solid #f3f4f6;
            color: #374151;
            vertical-align: middle;
        }

        .dash-table tbody tr:last-child td {
            border-bottom: none;
        }

        .dash-table tbody tr:hover {
            background: #f0f9ff;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.78rem;
            white-space: nowrap;
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-badge.pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-badge.pending::before {
            background: #d97706;
        }

        .status-badge.approved {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-badge.approved::before {
            background: #16a34a;
        }

        .status-badge.rejected {
            background: #fee2e2;
            color: #dc2626;
        }

        .status-badge.rejected::before {
            background: #dc2626;
        }

        .status-badge.cancelled {
            background: #f3f4f6;
            color: #6b7280;
        }

        .status-badge.cancelled::before {
            background: #6b7280;
        }

        .type-badge {
            display: inline-flex;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .type-badge.rent {
            background: #eff6ff;
            color: #2563eb;
        }

        .type-badge.buy {
            background: #fef3c7;
            color: #b45309;
        }

        .action-buttons {
            display: flex;
            gap: 0.35rem;
            justify-content: center;
        }

        .btn-action {
            width: 30px;
            height: 30px;
            padding: 0;
            border-radius: 7px;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.8rem;
            text-decoration: none;
        }

        .btn-action.btn-view {
            background: #eff6ff;
            color: #2563eb;
        }

        .btn-action.btn-view:hover {
            background: #dbeafe;
            transform: translateY(-1px);
        }

        .filter-row {
            padding: 0.875rem 1.5rem;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .filter-row .form-select {
            max-width: 200px;
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            padding: 0.4rem 0.75rem;
            font-size: 0.8125rem;
            color: #374151;
        }

        .pagination-wrapper {
            margin-top: 1rem;
            padding: 0.75rem 1.5rem;
            border-top: 1px solid #f3f4f6;
        }

        .pagination {
            gap: 0.3rem;
            margin: 0;
        }

        .pagination .page-link {
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            padding: 0.35rem 0.75rem;
            color: #374151;
            font-weight: 600;
            font-size: 0.8rem;
            background: #fff;
        }

        .pagination .page-link:hover {
            background: #f0f9ff;
            border-color: #bfdbfe;
            color: #1e40af;
        }

        .pagination .page-item.active .page-link {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .pagination .page-item.disabled .page-link {
            background: #f9fafb;
            color: #d1d5db;
        }

        .empty-state {
            padding: 3rem;
            text-align: center;
            color: #9ca3af;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .empty-state i {
            font-size: 2.5rem;
            color: #d1d5db;
            margin-bottom: 0.75rem;
        }

        .empty-state p {
            margin: 0;
            font-size: 0.8125rem;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            main.content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <div th:replace="~{layout/header :: header}"></div>
    <div th:replace="~{layout/sidebar :: sidebar}"></div>

    <main class="content">
        <div class="detail-body">
            <div class="page-header-bar">
                <div>
                    <h2>
                        <i class="bi bi-envelope-paper-fill" style="color:#3b82f6;font-size:1.2rem;"></i>
                        Yêu cầu thuê/mua
                    </h2>
                    <div class="update-time">Quản lý các yêu cầu thuê/mua từ khách hàng</div>
                </div>
            </div>

            <div class="d-card">
                <div class="table-header-row">
                    <div class="thr-title">
                        <i class="bi bi-table"></i>
                        Danh sách yêu cầu
                    </div>
                    <span id="totalCount" style="font-size:0.78rem;color:#6b7280;font-weight:600;"></span>
                </div>

                <div class="filter-row">
                    <label style="font-size:0.78rem;font-weight:600;color:#6b7280;">Trạng thái:</label>
                    <select class="form-select" id="statusFilter" onchange="loadRequests(1)">
                        <option value="">Tất cả</option>
                        <option value="PENDING">Chờ xử lý</option>
                        <option value="APPROVED">Đã duyệt</option>
                        <option value="REJECTED">Đã từ chối</option>
                        <option value="CANCELLED">Đã hủy</option>
                    </select>
                </div>

                <div class="table-responsive">
                    <table class="dash-table">
                        <thead>
                            <tr>
                                <th>Mã yêu cầu</th>
                                <th>Khách hàng</th>
                                <th>Bất động sản</th>
                                <th>Loại</th>
                                <th>Trạng thái</th>
                                <th>Ngày gửi</th>
                                <th style="text-align:center;">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="requestTableBody"></tbody>
                    </table>
                </div>

                <div id="pagination"></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        let currentPage = 1;

        function loadRequests(page) {
            currentPage = page;
            const status = $('#statusFilter').val();

            $.ajax({
                url: '/api/v1/admin/property-requests',
                type: 'GET',
                data: { page: page, size: 10, status: status },
                success: function (data) {
                    const tbody = $('#requestTableBody');
                    tbody.empty();

                    if (!data.content || data.content.length === 0) {
                        tbody.append(`
                            <tr><td colspan="7">
                                <div class="empty-state">
                                    <i class="bi bi-inbox"></i>
                                    <p>Chưa có yêu cầu nào</p>
                                </div>
                            </td></tr>
                        `);
                        $('#totalCount').text('');
                        $('#pagination').empty();
                        return;
                    }

                    $('#totalCount').text(`Tổng: ${data.totalElements} yêu cầu`);

                    data.content.forEach(function (r) {
                        const statusClass = (r.status || '').toLowerCase();
                        const typeClass = r.requestType === 'RENT' ? 'rent' : 'buy';
                        const date = r.createdDate ? new Date(r.createdDate).toLocaleDateString('vi-VN') : '';

                        tbody.append(`
                            <tr>
                                <td style="font-weight:700;color:#111827;">#${r.id}</td>
                                <td style="font-weight:600;">${r.customerName}</td>
                                <td>${r.buildingName}</td>
                                <td><span class="type-badge ${typeClass}">${r.requestTypeLabel}</span></td>
                                <td><span class="status-badge ${statusClass}">${r.statusLabel}</span></td>
                                <td style="font-size:0.78rem;color:#6b7280;">${date}</td>
                                <td>
                                    <div class="action-buttons">
                                        <a href="/admin/property-request/${r.id}" class="btn-action btn-view" title="Xem chi tiết">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        `);
                    });

                    renderPagination(data);
                },
                error: function () {
                    Swal.fire({
                        icon: 'error',
                        title: 'Không thể tải dữ liệu',
                        text: 'Vui lòng thử lại sau.',
                        confirmButtonColor: '#3b82f6'
                    });
                }
            });
        }

        function renderPagination(data) {
            const wrap = $('#pagination');
            wrap.empty();

            if (data.totalPages <= 1) {
                return;
            }

            let html = '<div class="pagination-wrapper"><nav><ul class="pagination justify-content-center">';

            html += `<li class="page-item ${data.first ? 'disabled' : ''}">
                        <a class="page-link" onclick="loadRequests(${currentPage - 1})" href="javascript:void(0)">‹</a>
                     </li>`;

            for (let i = 1; i <= data.totalPages; i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                            <a class="page-link" onclick="loadRequests(${i})" href="javascript:void(0)">${i}</a>
                         </li>`;
            }

            html += `<li class="page-item ${data.last ? 'disabled' : ''}">
                        <a class="page-link" onclick="loadRequests(${currentPage + 1})" href="javascript:void(0)">›</a>
                     </li>`;

            html += '</ul></nav></div>';
            wrap.html(html);
        }

        $(document).ready(function () {
            loadRequests(1);
        });
    </script>
</body>

</html>
