<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SunTower - Yêu cầu của tôi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-color: #2d3e8f;
            --primary-light: #4a5fc1;
            --secondary-color: #f5f7fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--secondary-color);
        }

        .header {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-top {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .badge-custom {
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .btn-logout {
            background: white;
            color: var(--primary-color);
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
        }

        .btn-logout:hover {
            background: #f0f0f0;
            color: var(--primary-color);
        }

        .nav-custom {
            background: var(--primary-color);
        }

        .nav-custom .nav-link {
            color: white !important;
            font-weight: 500;
            font-size: 14px;
            padding: 14px 18px;
            border-radius: 6px 6px 0 0;
            transition: all 0.2s;
        }

        .nav-custom .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-custom .nav-link.active {
            background: rgba(255, 255, 255, 0.15);
            font-weight: 600;
        }

        .dropdown-menu-custom {
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        .page-shell {
            padding: 1.5rem;
        }

        .welcome-section {
            background: white;
            border-left: 4px solid var(--primary-color);
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .welcome-section h1 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .request-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
            margin-bottom: 1rem;
            padding: 1.25rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .request-card:hover {
            border-color: var(--primary-color);
            box-shadow: 0 8px 20px rgba(45, 62, 143, 0.08);
        }

        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .request-id {
            font-weight: 700;
            color: #111827;
            font-size: 1rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem 0.8rem;
            border-radius: 999px;
            font-weight: 600;
            font-size: 0.82rem;
            white-space: nowrap;
        }

        .status-badge::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .status-badge.pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-badge.pending::before {
            background: #d97706;
        }

        .status-badge.approved {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-badge.approved::before {
            background: #16a34a;
        }

        .status-badge.rejected {
            background: #fee2e2;
            color: #dc2626;
        }

        .status-badge.rejected::before {
            background: #dc2626;
        }

        .status-badge.cancelled {
            background: #f3f4f6;
            color: #6b7280;
        }

        .status-badge.cancelled::before {
            background: #6b7280;
        }

        .type-badge {
            display: inline-flex;
            padding: 0.2rem 0.55rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.78rem;
        }

        .type-badge.rent {
            background: #eff6ff;
            color: #2563eb;
        }

        .type-badge.buy {
            background: #fef3c7;
            color: #b45309;
        }

        .request-info {
            font-size: 0.95rem;
            color: #4b5563;
        }

        .request-info i {
            margin-right: 0.35rem;
            color: var(--primary-color);
        }

        .btn-cancel {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            padding: 0.45rem 0.9rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.82rem;
            cursor: pointer;
        }

        .btn-cancel:hover {
            background: #fecaca;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            color: #9ca3af;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .empty-state i {
            font-size: 3rem;
            color: #d1d5db;
            margin-bottom: 1rem;
            display: block;
        }

        @media (max-width: 991px) {
            .page-shell {
                padding: 1rem;
            }

            .request-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="header-top py-3">
            <div class="container-fluid px-4">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div class="logo">SunTower</div>
                    <div class="d-flex align-items-center gap-3 flex-wrap justify-content-end">
                        <div class="text-end">
                            <small class="d-block opacity-85">Xin chào,</small>
                            <strong th:text="${#authentication.name}">Nguyễn Văn A</strong>
                        </div>
                        <span class="badge-custom">KHÁCH HÀNG</span>
                        <a href="#" class="btn btn-logout"
                            onclick="event.preventDefault(); document.getElementById('logoutForm').submit();">Đăng xuất</a>
                        <form id="logoutForm" th:action="@{/auth/logout}" method="post" style="display:none;"></form>
                    </div>
                </div>
            </div>
        </div>

        <nav class="nav-custom">
            <div class="container-fluid px-4">
                <ul class="nav flex-wrap">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customer/home}">
                            <i class="bi bi-house-door me-1"></i>Trang chủ
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customer/contract/list}">
                            <i class="bi bi-file-text me-1"></i>Hợp đồng
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customer/invoice/list}">
                            <i class="bi bi-credit-card me-1"></i>Thanh toán
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customer/building/list}">
                            <i class="bi bi-building me-1"></i>Tòa nhà
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-grid-3x3-gap me-1"></i>Tiện ích
                        </a>
                        <ul class="dropdown-menu dropdown-menu-custom">
                            <li><a class="dropdown-item" th:href="@{/customer/transaction/history}"><i class="bi bi-clock-history me-2"></i>Lịch sử giao dịch</a></li>
                            <li><a class="dropdown-item" th:href="@{/customer/service}"><i class="bi bi-clipboard-check me-2"></i>Dịch vụ</a></li>
                            <li><a class="dropdown-item active" th:href="@{/customer/property-request/list}"><i class="bi bi-envelope-paper me-2"></i>Yêu cầu của tôi</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/customer/profile}">
                            <i class="bi bi-person-circle me-1"></i>Tài khoản
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
    </div>

    <div class="page-shell">
        <div class="welcome-section p-4 mb-4">
            <h1 class="h3">Yêu cầu của tôi</h1>
            <p class="text-muted mb-0">Theo dõi trạng thái các yêu cầu thuê/mua bất động sản của bạn.</p>
        </div>

        <div id="requestList"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        function loadRequests() {
            $.ajax({
                url: '/api/v1/customer/property-requests',
                type: 'GET',
                success: function (data) {
                    const container = $('#requestList');
                    container.empty();

                    if (!data || data.length === 0) {
                        container.append(`
                            <div class="empty-state">
                                <i class="bi bi-inbox"></i>
                                <h5>Chưa có yêu cầu nào</h5>
                                <p>Bạn có thể gửi yêu cầu thuê hoặc mua từ trang <a href="/customer/building/list">Tòa nhà</a>.</p>
                            </div>
                        `);
                        return;
                    }

                    data.forEach(function (r) {
                        const statusClass = (r.status || '').toLowerCase();
                        const typeClass = r.requestType === 'RENT' ? 'rent' : 'buy';
                        const date = r.createdDate ? new Date(r.createdDate).toLocaleDateString('vi-VN') : '';

                        let cancelBtn = '';
                        if (r.status === 'PENDING') {
                            cancelBtn = `<button class="btn-cancel" onclick="cancelRequest(${r.id})">
                                            <i class="bi bi-x-circle me-1"></i>Hủy yêu cầu
                                         </button>`;
                        }

                        container.append(`
                            <div class="request-card">
                                <div class="request-header">
                                    <div>
                                        <div class="d-flex align-items-center flex-wrap gap-2 mb-2">
                                            <span class="request-id">Yêu cầu #${r.id}</span>
                                            <span class="type-badge ${typeClass}">${r.requestTypeLabel}</span>
                                        </div>
                                        <div class="request-info">
                                            <div class="mb-2">
                                                <i class="bi bi-building"></i>${r.buildingName}
                                            </div>
                                            <div>
                                                <i class="bi bi-calendar3"></i>Ngày gửi: ${date}
                                            </div>
                                        </div>
                                    </div>
                                    <span class="status-badge ${statusClass}">${r.statusLabel}</span>
                                </div>
                                <div class="mt-3 text-end">${cancelBtn}</div>
                            </div>
                        `);
                    });
                },
                error: function () {
                    Swal.fire({
                        icon: 'error',
                        title: 'Không thể tải dữ liệu',
                        text: 'Vui lòng thử lại sau.',
                        confirmButtonColor: '#2d3e8f'
                    });
                }
            });
        }

        function cancelRequest(id) {
            Swal.fire({
                icon: 'warning',
                title: 'Xác nhận hủy yêu cầu',
                text: 'Bạn có chắc muốn hủy yêu cầu này không?',
                showCancelButton: true,
                confirmButtonText: 'Hủy yêu cầu',
                cancelButtonText: 'Quay lại',
                confirmButtonColor: '#dc2626'
            }).then((result) => {
                if (result.isConfirmed) {
                    $.ajax({
                        url: `/api/v1/customer/property-requests/${id}`,
                        type: 'DELETE',
                        success: function (msg) {
                            Swal.fire({
                                icon: 'success',
                                title: 'Thành công',
                                text: (msg && msg.message) ? msg.message : 'Đã hủy yêu cầu.',
                                confirmButtonColor: '#2d3e8f'
                            }).then(() => loadRequests());
                        },
                        error: function (xhr) {
                            let errMsg = 'Hủy yêu cầu thất bại.';
                            if (xhr.responseJSON && xhr.responseJSON.message) {
                                errMsg = xhr.responseJSON.message;
                            }
                            Swal.fire({
                                icon: 'error',
                                title: 'Có lỗi xảy ra',
                                text: errMsg,
                                confirmButtonColor: '#2d3e8f'
                            });
                        }
                    });
                }
            });
        }

        $(document).ready(function () {
            loadRequests();
        });
    </script>
</body>

</html>
