name: Playwright Local CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Lay ma nguon
        uses: actions/checkout@v4

      - name: Cai Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cai Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: automation-test-playwright/package-lock.json

      - name: Import database
        run: mysql -h 127.0.0.1 -uroot -p123456 < sunTower-main/estate_db_generator/sql_estate.sql

      - name: Start backend SunTower
        working-directory: sunTower-main
        env:
          SPRING_PROFILES_ACTIVE: mysql,local-nooauth
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/estate
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: 123456
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
          SPRING_JPA_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
          SPRING_MAIL_HOST: smtp.gmail.com
          SPRING_MAIL_PORT: 587
          SPRING_MAIL_USERNAME: test@example.com
          SPRING_MAIL_PASSWORD: test
          SPRING_MAIL_SMTP_AUTH: "true"
          SPRING_MAIL_SMTP_STARTTLS_ENABLE: "true"
          SPRING_MAIL_SMTP_STARTTLS_REQUIRED: "true"
          SPRING_MAIL_SMTP_SSL_TRUST: smtp.gmail.com
          BUILDING_IMAGE_UPLOAD_DIR: ./uploads/building_img
          PLANNING_MAP_IMAGE_UPLOAD_DIR: ./uploads/planning_map_img
          GOONG_API_KEY: test-key
          JWT_SECRET: this_is_a_ci_test_secret_at_least_32_chars
          JWT_ACCESS_TOKEN_EXPIRATION: 15m
          JWT_REFRESH_TOKEN_EXPIRATION: 7d
          JWT_COOKIE_SECURE: "false"
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          GOOGLE_CLIENT_SCOPE: openid,profile,email
          PAYMENT_QR_BANK_BIN: 970422
          PAYMENT_QR_ACCOUNT_NO: 123456789
          PAYMENT_QR_ACCOUNT_NAME: SUNTOWER_TEST
          TEST_SUPPORT_OTP_TOKEN: ci-test-support-token
        run: |
          chmod +x ./mvnw
          nohup ./mvnw spring-boot:run > app.log 2>&1 &

      - name: Doi backend san sang
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8080/suntower > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 5
          done
          cat sunTower-main/app.log
          exit 1

      - name: Cai dependency Playwright
        working-directory: automation-test-playwright
        run: npm ci

      - name: Cai Chromium
        working-directory: automation-test-playwright
        run: npx playwright install --with-deps chromium

      - name: Kiem tra TypeScript
        working-directory: automation-test-playwright
        run: npm run typecheck

      - name: Chay E2E UI regression
        working-directory: automation-test-playwright
        env:
          APP_ENV: local
          BASE_URL: http://localhost:8080
          ADMIN_USERNAME: admin123
          STAFF_USERNAME: tmq0102
          CUSTOMER_USERNAME: abcVietNam
          DEFAULT_PASSWORD: 12345678
          DB_JDBC_URL: jdbc:mysql://127.0.0.1:3306/estate
          DB_USERNAME: root
          DB_PASSWORD: 123456
          TEST_SUPPORT_OTP_TOKEN: ci-test-support-token
        run: npm run test:regression

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: automation-test-playwright/.runtime/playwright-report

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: automation-test-playwright/.runtime/test-results
